name: Deploy

on:
  push:
    branches:
      - main     # → production
      - develop  # → staging
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: staging
        type: choice
        options: [staging, production]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/jerry-investment/prism

jobs:
  # ─── Build & push Docker images ─────────────────────────────────────────
  build:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
      env_name: ${{ steps.vars.outputs.env_name }}

    steps:
      - uses: actions/checkout@v4

      - name: Resolve env name
        id: vars
        run: |
          BRANCH="${{ github.ref_name }}"
          ENV="${{ github.event.inputs.environment }}"
          if [[ "$ENV" == "production" ]] || [[ "$BRANCH" == "main" ]]; then
            echo "env_name=production" >> $GITHUB_OUTPUT
          else
            echo "env_name=staging" >> $GITHUB_OUTPUT
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}-backend
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=${{ steps.vars.outputs.env_name }}

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-frontend:sha-${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}-frontend:${{ steps.vars.outputs.env_name }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  # ─── Deploy ─────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to ${{ needs.build.outputs.env_name }}
    runs-on: ubuntu-latest
    needs: build
    environment: ${{ needs.build.outputs.env_name }}

    steps:
      - uses: actions/checkout@v4

      - name: Set deployment vars
        id: vars
        run: |
          ENV="${{ needs.build.outputs.env_name }}"
          if [[ "$ENV" == "production" ]]; then
            echo "ec2_host=${{ secrets.EC2_HOST_PROD }}" >> $GITHUB_OUTPUT
            echo "domain=${{ secrets.DOMAIN_PROD }}" >> $GITHUB_OUTPUT
          else
            echo "ec2_host=${{ secrets.EC2_HOST_STAGING }}" >> $GITHUB_OUTPUT
            echo "domain=${{ secrets.DOMAIN_STAGING }}" >> $GITHUB_OUTPUT
          fi

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ steps.vars.outputs.ec2_host }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: IMAGE_TAG,DOMAIN,GH_ACTOR,GH_TOKEN
          script: |
            set -e
            cd /opt/prism

            # Fetch latest code
            git fetch origin ${{ github.ref_name }}
            git reset --hard origin/${{ github.ref_name }}

            # Login to GHCR
            echo "$GH_TOKEN" | docker login ghcr.io -u "$GH_ACTOR" --password-stdin

            # Pull new images
            IMAGE_TAG="$IMAGE_TAG" docker compose -f docker-compose.prod.yml pull backend worker frontend

            # Rolling restart — keep db and redis running
            IMAGE_TAG="$IMAGE_TAG" DOMAIN="$DOMAIN" \
              docker compose -f docker-compose.prod.yml up -d --no-deps \
              traefik backend worker frontend

            # Prune old images
            docker image prune -f
        env:
          IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
          DOMAIN: ${{ steps.vars.outputs.domain }}
          GH_ACTOR: ${{ github.actor }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Health check
        run: |
          sleep 20
          curl -f --max-time 10 "https://${{ steps.vars.outputs.domain }}/api/health" \
            && echo "Health check passed" \
            || (echo "Health check FAILED — check deployment logs" && exit 1)

      - name: Rollback instructions on failure
        if: failure()
        run: |
          echo ""
          echo "=== ROLLBACK INSTRUCTIONS ==="
          echo "SSH to ${{ steps.vars.outputs.ec2_host }} and run:"
          echo "  cd /opt/prism"
          echo "  git log --oneline -5          # find previous commit"
          echo "  git reset --hard <prev-sha>"
          echo "  IMAGE_TAG=<prev-tag> docker compose -f docker-compose.prod.yml up -d"
          echo "============================="
