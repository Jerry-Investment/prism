version: "3.9"

# Test environment — ephemeral, no persistent volumes

services:
  db_test:
    image: timescale/timescaledb:latest-pg16
    container_name: prism_db_test
    environment:
      POSTGRES_DB: prism_test
      POSTGRES_USER: prism
      POSTGRES_PASSWORD: prism
    volumes:
      - ./db/init:/docker-entrypoint-initdb.d:ro
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prism"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis_test:
    image: redis:7-alpine
    container_name: prism_redis_test
    tmpfs:
      - /data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend_test:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: prism_backend_test
    environment:
      DATABASE_URL: postgresql+asyncpg://prism:prism@db_test:5432/prism_test
      DATABASE_SYNC_URL: postgresql://prism:prism@db_test:5432/prism_test
      REDIS_URL: redis://redis_test:6379/0
      CELERY_BROKER_URL: redis://redis_test:6379/0
      CELERY_RESULT_BACKEND: redis://redis_test:6379/1
      DEBUG: "true"
    depends_on:
      db_test:
        condition: service_healthy
      redis_test:
        condition: service_healthy
    command: pytest --cov=app --cov-report=term-missing -v
